<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MonkeyMagic.ai</title>
  <link rel="stylesheet" href="/assets/monkeymagic.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Floating logo -->
  <div class="logo-overlay">
    <a href="/">
      <img src="/images/MM_LOGO5.PNG" alt="Monkey Magic Logo" class="logo">
    </a>
  </div>

  <!-- Hero -->
  <div class="hero">
    <video autoplay loop muted playsinline>
      <source src="/videos/hero1.mp4" type="video/mp4">
    </video>
    <div class="hero-text">
      <h1>Monkey Magic AI</h1>
      <p>Where monkeys code, dream and sometimes steal bananas</p>
    </div>
  </div>

  <!-- Three main section cards -->
  <section class="section-cards">
    <div class="container">
      <a href="/about.html" class="section-card">
        <h3>About</h3>
        <p>Who we are and what we do</p>
      </a>
      <a href="/knowledge.html" class="section-card">
        <h3>Knowledge</h3>
        <p>For curious little monkeys</p>
      </a>
      <a href="/fun.html" class="section-card">
        <h3>Fun</h3>
        <p>For cheeky little monkeys</p>
      </a>
    </div>
  </section>

  <!-- Search -->
  <div class="search-container">
    <input type="text" id="search-input" placeholder="Search knowledge...">
    <div id="search-results"></div>
  </div>

  <script src="/assets/search.js"></script>

</body>
</html>
