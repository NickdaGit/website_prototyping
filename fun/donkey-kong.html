<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donkey Kong SVG Test</title>
</head>
<body style="background:#000; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">
  <svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
    <!-- Girder background -->
    <rect x="0" y="400" width="512" height="112" fill="#8B4513" />
    <rect x="0" y="300" width="512" height="100" fill="#8B4513" />
    <rect x="0" y="200" width="512" height="100" fill="#8B4513" />
    <!-- Ladders -->
    <rect x="100" y="220" width="20" height="180" fill="#A0522D" />
    <rect x="380" y="320" width="20" height="180" fill="#A0522D" />
    <!-- Donkey Kong -->
    <g transform="translate(180,180)">
      <!-- Body -->
      <ellipse cx="75" cy="80" rx="60" ry="90" fill="#8B4513" stroke="#4B2E1A" stroke-width="8"/>
      <!-- Head -->
      <circle cx="75" cy="30" r="45" fill="#8B4513" stroke="#4B2E1A" stroke-width="6"/>
      <!-- Eyes -->
      <circle cx="60" cy="25" r="12" fill="white"/>
      <circle cx="90" cy="25" r="12" fill="white"/>
      <circle cx="60" cy="25" r="6" fill="black"/>
      <circle cx="90" cy="25" r="6" fill="black"/>
      <!-- Mouth -->
      <path d="M50 50 Q75 70 100 50" fill="none" stroke="#000" stroke-width="8"/>
      <!-- Red shirt -->
      <rect x="30" y="70" width="90" height="60" fill="#C41E3A" rx="10"/>
      <!-- Blue overalls -->
      <path d="M30 130 L90 130 L120 180 L30 180 Z" fill="#0000FF"/>
      <!-- Arms (throwing barrel) -->
      <ellipse cx="120" cy="100" rx="25" ry="50" fill="#8B4513" transform="rotate(-45 120 100)"/>
      <!-- Legs -->
      <ellipse cx="60" cy="180" rx="30" ry="40" fill="#8B4513"/>
      <ellipse cx="90" cy="180" rx="30" ry="40" fill="#8B4513"/>
    </g>
    <!-- Barrel -->
    <g transform="translate(280,100)">
      <ellipse cx="0" cy="0" rx="40" ry="50" fill="#8B4513" stroke="#4B2E1A" stroke-width="6"/>
      <rect x="-30" y="-20" width="60" height="40" fill="#8B4513" rx="10"/>
    </g>
  </svg>
</body>
</html>
